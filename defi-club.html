<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Défi Club — Échecs Club Ajaccien</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" crossorigin="anonymous" />
  <style>
    :root {
      --navy:   #1e1e2f;
      --gold:   #e6b800;
      --green:  #1D9E75;
      --red:    #c0392b;
      --orange: #EF9F27;
      --wa:     #25D366;
      --bg:     #f5f7fa;
      --surface:#ffffff;
      --border: rgba(0,0,0,0.12);
      --text:   #333;
      --muted:  #666;
      --radius: 12px;
    }
    .defi-page { max-width: 640px; margin: 2rem auto; padding: 0 1rem 3rem; }
    .defi-page h1 { font-size: 22px; font-weight: 600; color: var(--navy); display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; }
    .d-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.4rem; margin-bottom: 1.25rem; }
    .d-section-title { font-size: 13px; font-weight: 600; color: var(--navy); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
    .d-section-title i { color: var(--gold); }
    .d-section { margin-bottom: 1rem; }
    .d-label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; font-weight: 500; }
    .d-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .d-input, .d-select, .d-textarea { width: 100%; padding: 9px 11px; font-size: 14px; font-family: inherit; border: 0.5px solid rgba(0,0,0,0.2); border-radius: 8px; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.15s; }
    .d-input:focus, .d-select:focus, .d-textarea:focus { border-color: var(--navy); background: #fff; }
    .d-textarea { resize: vertical; min-height: 65px; }
    .d-hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .d-btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px; padding: 9px 18px; font-size: 14px; font-family: inherit; border: 0.5px solid rgba(0,0,0,0.2); border-radius: 8px; background: transparent; color: var(--text); cursor: pointer; transition: background 0.15s, transform 0.1s; }
    .d-btn:hover { background: #f0f0eb; }
    .d-btn:active { transform: scale(0.98); }
    .d-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .d-btn.full { width: 100%; padding: 11px; }
    .d-btn.primary { background: var(--navy); color: #fff; border-color: var(--navy); }
    .d-btn.primary:hover { background: #2d2d45; }
    .d-btn.whatsapp { background: var(--wa); color: #fff; border-color: var(--wa); }
    .d-btn.whatsapp:hover { background: #1ebe5d; }

    .worker-status { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); margin-bottom: 1.25rem; padding: 8px 12px; background: var(--bg); border-radius: 8px; border: 0.5px solid var(--border); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .status-dot.ok  { background: var(--green); }
    .status-dot.err { background: var(--red); }

    /* Défis en cours */
    .defis-en-cours { margin-bottom: 1.25rem; }
    .defi-actif {
      display: flex; align-items: center; justify-content: space-between;
      background: #fff8e1; border: 0.5px solid var(--gold);
      border-radius: 10px; padding: 12px 14px; margin-bottom: 8px;
    }
    .defi-actif-info { font-size: 13px; color: var(--navy); }
    .defi-actif-info strong { display: block; font-size: 14px; }
    .defi-actif-info span { color: var(--muted); font-size: 12px; }
    .defi-actif-btns { display: flex; gap: 6px; flex-shrink: 0; }

    .result-card { background: #f9f9f6; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.5rem; text-align: center; }
    .result-title { font-size: 16px; font-weight: 600; color: var(--navy); margin-bottom: 0.25rem; }
    #qr-container { display: flex; justify-content: center; margin: 1rem auto; }
    #challenge-url { font-size: 12px; color: var(--muted); word-break: break-all; margin: 0.5rem 0; }
    .timer-bar-bg { background: rgba(0,0,0,0.1); border-radius: 4px; height: 6px; margin: 0.75rem 0; overflow: hidden; }
    .timer-bar    { height: 6px; border-radius: 4px; background: var(--green); transition: width 1s linear, background 1s; }
    .timer-row    { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); }
    .action-btns  { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 1rem; }
    .expire-section { margin-top: 1rem; border-top: 0.5px solid var(--border); padding-top: 1rem; }

    .accepted-banner { display: none; background: linear-gradient(135deg, #0f6e56, #1D9E75); color: #fff; border-radius: 10px; padding: 14px 18px; margin: 1rem 0; font-size: 15px; font-weight: 600; align-items: center; gap: 10px; }
    .accepted-banner.visible { display: flex; }
    .elo-badge { display: inline-block; background: var(--navy); color: var(--gold); font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; margin-top: 4px; }

    .d-error { font-size: 13px; color: var(--red); margin-top: 8px; }
    .d-muted { font-size: 13px; color: var(--muted); }
    .d-spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }
    .d-spinner.dark { border-color: rgba(0,0,0,0.15); border-top-color: var(--navy); }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 480px) { .d-row2 { grid-template-columns: 1fr; } .action-btns { flex-direction: column; } }
  </style>
</head>
<body>

<div class="defi-page">
  <h1><i class="fas fa-chess-knight" style="color:#e6b800"></i> Défi Club — ECA</h1>

  <div class="worker-status">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Vérification du service…</span>
  </div>

  <!-- ══ DÉFIS EN COURS ══ -->
  <div id="defis-en-cours" class="defis-en-cours" style="display:none;">
    <div class="d-section-title" style="margin-bottom:0.75rem;"><i class="fas fa-fire" style="color:var(--gold)"></i> Défi en cours</div>
    <div id="defis-list"></div>
  </div>

  <!-- ══ ÉTAPE 1 : FORMULAIRE ══ -->
  <div id="step1">
    <div class="d-card">
      <div class="d-section-title"><i class="fas fa-chess"></i> Paramètres de la partie</div>
      <div class="d-row2 d-section">
        <div>
          <label class="d-label">Cadence (minutes)</label>
          <select id="clock-limit" class="d-select">
            <option value="60">1 min — bullet</option>
            <option value="120">2 min — bullet</option>
            <option value="180">3 min — blitz</option>
            <option value="300" selected>5 min — blitz</option>
            <option value="600">10 min — rapide</option>
            <option value="900">15 min — rapide</option>
            <option value="1800">30 min — classique</option>
          </select>
        </div>
        <div>
          <label class="d-label">Incrément (secondes)</label>
          <select id="clock-increment" class="d-select">
            <option value="0">0 sec</option>
            <option value="2" selected>2 sec</option>
            <option value="3">3 sec</option>
            <option value="5">5 sec</option>
            <option value="10">10 sec</option>
          </select>
        </div>
      </div>
      <div class="d-row2 d-section">
        <div>
          <label class="d-label">Variante</label>
          <select id="variant" class="d-select">
            <option value="standard" selected>Standard</option>
            <option value="chess960">Chess 960</option>
            <option value="crazyhouse">Crazyhouse</option>
            <option value="antichess">Antichess</option>
            <option value="atomic">Atomic</option>
            <option value="horde">Horde</option>
            <option value="kingOfTheHill">King of the Hill</option>
            <option value="threeCheck">Three-check</option>
          </select>
        </div>
        <div>
          <label class="d-label">Couleur</label>
          <select id="color" class="d-select">
            <option value="random" selected>Aléatoire</option>
            <option value="white">Blanc</option>
            <option value="black">Noir</option>
          </select>
        </div>
      </div>
      <div class="d-row2 d-section">
        <div>
          <label class="d-label"><i class="fas fa-chart-bar"></i> Elo minimum <span style="font-weight:400">(optionnel)</span></label>
          <input type="number" id="elo-min" class="d-input" placeholder="ex : 1000" min="600" max="3000" step="50" />
        </div>
        <div>
          <label class="d-label"><i class="fas fa-chart-bar"></i> Elo maximum <span style="font-weight:400">(optionnel)</span></label>
          <input type="number" id="elo-max" class="d-input" placeholder="ex : 1800" min="600" max="3000" step="50" />
        </div>
      </div>
      <div class="d-hint"><i class="fas fa-info-circle"></i> Laisser vide pour accepter tous les niveaux.</div>
      <div class="d-row2" style="margin-top:1rem;">
        <div>
          <label class="d-label"><i class="fas fa-calendar-alt"></i> Date RDV IRL</label>
          <input type="date" id="rdv-date" class="d-input" />
        </div>
        <div>
          <label class="d-label"><i class="fas fa-clock"></i> Heure</label>
          <input type="time" id="rdv-time" class="d-input" value="19:00" />
        </div>
      </div>
    </div>

    <div class="d-card">
      <div class="d-section-title"><i class="fas fa-envelope"></i> Message aux membres</div>
      <textarea id="message" class="d-textarea" placeholder="Ex : Partie amicale ce soir, venez nombreux !"></textarea>
      <div class="d-hint"><i class="fas fa-info-circle"></i> PM + post forum envoyés automatiquement à l'équipe <strong>defis-eca</strong>.</div>
    </div>

    <button class="d-btn primary full" id="create-btn" onclick="createChallenge()">
      <i class="fas fa-chess-knight"></i> Créer le défi et notifier le club
    </button>
    <div id="error-msg" class="d-error"></div>
  </div>

  <!-- ══ ÉTAPE 2 : RÉSULTAT ══ -->
  <div id="step2" style="display:none;">
    <div class="result-card">
      <div class="result-title"><i class="fas fa-check-circle" style="color:var(--green)"></i> Défi créé !</div>
      <div id="rdv-display"  class="d-muted" style="font-size:13px; margin:4px 0;"></div>
      <div id="msg-display"  class="d-muted" style="font-size:13px; font-style:italic; margin:4px 0;"></div>
      <div id="elo-display"  style="margin:4px 0;"></div>
      <div id="pm-status"    style="font-size:13px; margin-top:6px;"></div>
      <div id="forum-status" style="font-size:13px; margin-top:4px;"></div>

      <div class="accepted-banner" id="accepted-banner">
        <i class="fas fa-handshake"></i>
        <span id="accepted-text">Défi accepté !</span>
      </div>

      <div id="qr-container"></div>
      <div id="challenge-url"></div>

      <div style="margin:0.5rem 0;">
        <div class="timer-row"><span>Temps restant</span><span id="timer-text">12h00m00s</span></div>
        <div class="timer-bar-bg"><div class="timer-bar" id="timer-bar" style="width:100%"></div></div>
      </div>

      <div class="action-btns">
        <button class="d-btn" onclick="copyLink()"><i class="fas fa-copy"></i> Copier</button>
        <button class="d-btn" onclick="openChallenge()"><i class="fas fa-external-link-alt"></i> Lichess</button>
        <button class="d-btn whatsapp" onclick="shareWhatsApp()"><i class="fab fa-whatsapp"></i> WhatsApp</button>
      </div>

      <div class="expire-section">
        <button class="d-btn full" id="expire-btn" onclick="expireDefi()">
          <i class="fas fa-bell-slash"></i> Envoyer message d'expiration maintenant
        </button>
        <div id="expire-status" style="font-size:13px; margin-top:6px;"></div>
      </div>
      <div style="margin-top:0.75rem;">
        <button class="d-btn full" onclick="reset()"><i class="fas fa-plus"></i> Nouveau défi</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const WORKER_URL      = 'https://eca-defi-worker.scapa2a.workers.dev';
const EXPIRE_DURATION = 12 * 60 * 60 * 1000;

let challengeUrl      = '';
let challengeId       = '';
let currentTopicId    = null;
let currentCadence    = '';
let currentVariant    = '';
let currentEloRange   = null;
let currentRdv        = '';
let currentMsg        = '';
let expiresAt         = null;
let timerInterval     = null;
let pollInterval      = null;
let autoExpireTimeout = null;
let challengeAccepted = false;

// ── Init ────────────────────────────────────────────────────────
window.addEventListener('load', function() {
  checkWorker();
  loadDefisEnCours();
});

async function checkWorker() {
  const dot  = document.getElementById('status-dot');
  const text = document.getElementById('status-text');
  try {
    const res = await fetch(WORKER_URL + '/create-challenge', { method: 'OPTIONS' });
    if (res.ok || res.status === 204) {
      dot.classList.add('ok');
      text.textContent = 'Service en ligne — prêt à créer un défi';
    } else throw new Error();
  } catch {
    dot.classList.add('err');
    text.textContent = 'Service indisponible — contacte l\'administrateur du club';
    document.getElementById('create-btn').disabled = true;
  }
}

// ── Défis en cours ──────────────────────────────────────────────
async function loadDefisEnCours() {
  try {
    const res  = await fetch(WORKER_URL + '/defis-en-cours');
    const data = await res.json();
    if (!data.defis || data.defis.length === 0) return;

    const container = document.getElementById('defis-en-cours');
    const list      = document.getElementById('defis-list');
    list.innerHTML  = '';

    data.defis.forEach(function(d) {
      const remaining = d.expiresAt - Date.now();
      const h = Math.floor(remaining / 3600000);
      const m = Math.floor((remaining % 3600000) / 60000);
      const eloTxt = d.eloRange ? ' · ' + d.eloRange + ' Elo' : '';

      const el = document.createElement('div');
      el.className = 'defi-actif';
      el.innerHTML =
        '<div class="defi-actif-info">' +
          '<strong>' + d.variant + ' — ' + d.cadence + '</strong>' +
          '<span>' + eloTxt + ' · Expire dans ' + h + 'h' + String(m).padStart(2,'0') + '</span>' +
        '</div>' +
        '<div class="defi-actif-btns">' +
          '<button class="d-btn" onclick="window.open(\'' + d.url + '\',\'_blank\')"><i class="fas fa-external-link-alt"></i> Rejoindre</button>' +
          '<button class="d-btn whatsapp" onclick="shareWhatsAppUrl(\'' + d.url + '\',\'' + d.variant + '\',\'' + d.cadence + '\')"><i class="fab fa-whatsapp"></i></button>' +
        '</div>';
      list.appendChild(el);
    });

    container.style.display = 'block';
  } catch(e) {
    // Silencieux
  }
}

// ── Création du défi ────────────────────────────────────────────
async function createChallenge() {
  const errorEl = document.getElementById('error-msg');
  errorEl.textContent = '';

  const eloMin = document.getElementById('elo-min').value;
  const eloMax = document.getElementById('elo-max').value;

  if ((eloMin && !eloMax) || (!eloMin && eloMax)) {
    errorEl.textContent = '⚠ Remplis les deux champs Elo ou laisse les deux vides.'; return;
  }
  if (eloMin && eloMax && parseInt(eloMin) >= parseInt(eloMax)) {
    errorEl.textContent = '⚠ L\'Elo minimum doit être inférieur à l\'Elo maximum.'; return;
  }

  const btn = document.getElementById('create-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="d-spinner"></span> Création en cours…';

  expiresAt = Date.now() + EXPIRE_DURATION;

  const clockLimit     = parseInt(document.getElementById('clock-limit').value);
  const clockIncrement = parseInt(document.getElementById('clock-increment').value);
  const variant        = document.getElementById('variant').value;
  const color          = document.getElementById('color').value;
  const date           = document.getElementById('rdv-date').value;
  const time           = document.getElementById('rdv-time').value;
  const msg            = document.getElementById('message').value.trim();
  const variantEl      = document.getElementById('variant');
  const cadenceEl      = document.getElementById('clock-limit');
  const variantTxt     = variantEl.options[variantEl.selectedIndex].text;
  const cadenceTxt     = cadenceEl.options[cadenceEl.selectedIndex].text;

  currentCadence  = cadenceTxt;
  currentVariant  = variantTxt;
  currentEloRange = (eloMin && eloMax) ? eloMin + '–' + eloMax : null;
  currentMsg      = msg;

  try {
    // 1. Créer le défi
    const payload = { clockLimit, clockIncrement, variant, color };
    if (eloMin && eloMax) { payload.ratingMin = parseInt(eloMin); payload.ratingMax = parseInt(eloMax); }

    const res  = await fetch(WORKER_URL + '/create-challenge', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erreur ' + res.status);

    challengeUrl = data.url;
    challengeId  = data.id;

    // 2. Affichage
    let rdvText = '';
    if (date) {
      const d = new Date(date + 'T' + time);
      rdvText = 'RDV IRL : ' + d.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long' }) + ' à ' + time;
      document.getElementById('rdv-display').textContent = rdvText;
    }
    currentRdv = rdvText;
    if (msg) document.getElementById('msg-display').textContent = '« ' + msg + ' »';
    if (eloMin && eloMax) {
      document.getElementById('elo-display').innerHTML =
        '<span class="elo-badge"><i class="fas fa-chart-bar"></i> Elo : ' + eloMin + ' – ' + eloMax + '</span>';
    }

    // 3. PM
    const pmText = buildPMText(challengeUrl, rdvText, msg, cadenceTxt, clockIncrement, variantTxt, eloMin, eloMax);
    await sendPM(pmText);

    // 4. Forum
    const forumText = buildForumText(challengeUrl, rdvText, msg, cadenceTxt, clockIncrement, variantTxt, eloMin, eloMax);
    await postForum(forumText, cadenceTxt, variantTxt);

    // 5. Enregistre dans KV pour surveillance Cron
    await fetch(WORKER_URL + '/register-defi', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        challengeId: challengeId,
        url: challengeUrl,
        topicId: currentTopicId,
        cadence: cadenceTxt,
        variant: variantTxt,
        eloRange: currentEloRange
      })
    });

    // 6. QR
    const qrEl = document.getElementById('qr-container');
    qrEl.innerHTML = '';
    new QRCode(qrEl, { text: challengeUrl, width: 180, height: 180, correctLevel: QRCode.CorrectLevel.M });
    document.getElementById('challenge-url').textContent = challengeUrl;

    document.getElementById('step1').style.display = 'none';
    document.getElementById('step2').style.display = 'block';

    startTimer();
    startPolling();
    autoExpireTimeout = setTimeout(() => expireDefi(true), EXPIRE_DURATION);
    loadDefisEnCours();

  } catch (e) {
    errorEl.textContent = '⚠ ' + e.message;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-chess-knight"></i> Créer le défi et notifier le club';
  }
}

// ── Messages ────────────────────────────────────────────────────
function buildPMText(url, rdv, msg, cadence, incr, variant, eloMin, eloMax) {
  let text = '♟ Défi ouvert — Échecs Club Ajaccien !\n';
  if (msg) text += msg + '\n';
  text += '\nPartie : ' + variant + ' — ' + cadence + (incr > 0 ? ' + ' + incr + 's' : '') + '\n';
  if (eloMin && eloMax) text += 'Niveau requis : ' + eloMin + ' – ' + eloMax + ' Elo\n';
  if (rdv) text += rdv + '\n';
  text += '\nAccepte le défi ici : ' + url + '\n(Lien valable 12h)';
  return text;
}

function buildForumText(url, rdv, msg, cadence, incr, variant, eloMin, eloMax) {
  let text = '**Défi ouvert au club !**\n\n';
  if (msg) text += msg + '\n\n';
  text += '**Cadence :** ' + cadence + (incr > 0 ? ' + ' + incr + 's' : '') + '\n';
  text += '**Variante :** ' + variant + '\n';
  if (eloMin && eloMax) text += '**Niveau :** ' + eloMin + ' – ' + eloMax + ' Elo\n';
  if (rdv) text += '**' + rdv + '**\n';
  text += '\n**Lien du défi :** ' + url + '\n_(Lien valable 12h)_';
  return text;
}

async function sendPM(text) {
  const pmEl = document.getElementById('pm-status');
  pmEl.style.color = 'var(--muted)';
  pmEl.textContent = 'Envoi du PM…';
  const res  = await fetch(WORKER_URL + '/send-pm', {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: text })
  });
  const data = await res.json();
  if (res.ok) {
    pmEl.style.color = 'var(--green)';
    pmEl.textContent = '✓ PM envoyé à tous les membres.';
  } else {
    pmEl.style.color = 'var(--orange)';
    pmEl.textContent = '⚠ PM : ' + (data.error || 'erreur ' + res.status);
  }
}

async function postForum(text, cadence, variant) {
  const forumEl = document.getElementById('forum-status');
  forumEl.style.color = 'var(--muted)';
  forumEl.textContent = 'Publication sur le forum…';
  const title = '♟ Défi ' + variant + ' ' + cadence + ' — ' + new Date().toLocaleDateString('fr-FR');
  const res   = await fetch(WORKER_URL + '/forum-topic', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title: title, text: text })
  });
  const data = await res.json();
  if (res.ok) {
    currentTopicId = data.topicId;
    forumEl.style.color = 'var(--green)';
    forumEl.textContent = '✓ Post publié sur le forum de l\'équipe.';
  } else {
    forumEl.style.color = 'var(--orange)';
    forumEl.textContent = '⚠ Forum : ' + (data.error || 'erreur ' + res.status);
  }
}

// ── Polling (page ouverte) ──────────────────────────────────────
function startPolling() {
  pollInterval = setInterval(checkChallengeStatus, 15000);
}

async function checkChallengeStatus() {
  if (!challengeId || challengeAccepted) return;
  try {
    const res  = await fetch(WORKER_URL + '/challenge-status', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ challengeId: challengeId })
    });
    const data = await res.json();
    if (data.acceptedBy) {
      challengeAccepted = true;
      clearInterval(pollInterval);
      showAccepted(data.acceptedBy);
    }
  } catch(e) {}
}

function showAccepted(who) {
  const banner = document.getElementById('accepted-banner');
  document.getElementById('accepted-text').textContent = '♟ Défi accepté par ' + who + ' !';
  banner.classList.add('visible');
}

// ── Expiration ──────────────────────────────────────────────────
async function expireDefi(auto) {
  const statusEl = document.getElementById('expire-status');
  const btn      = document.getElementById('expire-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="d-spinner dark"></span> Envoi…'; }

  const res = await fetch(WORKER_URL + '/expire-defi', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ challengeId: challengeId, url: challengeUrl, topicId: currentTopicId })
  });

  if (res.ok) {
    statusEl.style.color = 'var(--green)';
    statusEl.textContent = '✓ Message d\'expiration envoyé.';
    if (btn) btn.textContent = '✓ Envoyé';
    clearInterval(timerInterval);
    clearInterval(pollInterval);
    document.getElementById('timer-bar').style.background = 'var(--red)';
    document.getElementById('timer-text').textContent = 'Expiré';
    loadDefisEnCours();
  } else {
    statusEl.style.color = 'var(--red)';
    statusEl.textContent = '⚠ Échec de l\'envoi.';
    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-bell-slash"></i> Réessayer'; }
  }
}

// ── Timer ───────────────────────────────────────────────────────
function startTimer() {
  const bar  = document.getElementById('timer-bar');
  const text = document.getElementById('timer-text');
  timerInterval = setInterval(function() {
    const remaining = expiresAt - Date.now();
    if (remaining <= 0) {
      clearInterval(timerInterval);
      bar.style.width = '0%'; bar.style.background = 'var(--red)';
      text.textContent = 'Expiré'; return;
    }
    const pct = (remaining / EXPIRE_DURATION) * 100;
    bar.style.width      = pct.toFixed(1) + '%';
    bar.style.background = pct > 50 ? 'var(--green)' : pct > 20 ? 'var(--orange)' : 'var(--red)';
    const h = Math.floor(remaining / 3600000);
    const m = Math.floor((remaining % 3600000) / 60000);
    const s = Math.floor((remaining % 60000) / 1000);
    text.textContent = h + 'h' + String(m).padStart(2,'0') + 'm' + String(s).padStart(2,'0') + 's';
  }, 1000);
}

// ── Partage WhatsApp ────────────────────────────────────────────
function shareWhatsApp() {
  shareWhatsAppUrl(challengeUrl, currentVariant, currentCadence);
}

function shareWhatsAppUrl(url, variant, cadence) {
  let text = '♟ *Défi Club ECA* — ' + variant + ' ' + cadence + '\n';
  if (currentEloRange) text += 'Niveau : ' + currentEloRange + ' Elo\n';
  if (currentRdv)      text += currentRdv + '\n';
  if (currentMsg)      text += currentMsg + '\n';
  text += '\nAccepte le défi ici : ' + url;
  window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
}

// ── Utilitaires ─────────────────────────────────────────────────
function copyLink() {
  navigator.clipboard.writeText(challengeUrl).then(function() {
    const btn = event.target.closest('button');
    const orig = btn.innerHTML;
    btn.textContent = 'Copié !';
    setTimeout(function() { btn.innerHTML = orig; }, 2000);
  });
}
function openChallenge() { window.open(challengeUrl, '_blank'); }

function reset() {
  clearInterval(timerInterval);
  clearInterval(pollInterval);
  if (autoExpireTimeout) clearTimeout(autoExpireTimeout);
  challengeUrl = ''; challengeId = ''; currentTopicId = null;
  expiresAt = null; challengeAccepted = false;
  currentCadence = ''; currentVariant = ''; currentEloRange = null;
  currentRdv = ''; currentMsg = '';
  document.getElementById('step2').style.display   = 'none';
  document.getElementById('step1').style.display   = 'block';
  document.getElementById('error-msg').textContent  = '';
  document.getElementById('qr-container').innerHTML = '';
  document.getElementById('pm-status').textContent  = '';
  document.getElementById('forum-status').textContent  = '';
  document.getElementById('expire-status').textContent = '';
  document.getElementById('rdv-display').textContent   = '';
  document.getElementById('msg-display').textContent   = '';
  document.getElementById('elo-display').innerHTML     = '';
  document.getElementById('accepted-banner').classList.remove('visible');
  document.getElementById('elo-min').value = '';
  document.getElementById('elo-max').value = '';
  loadDefisEnCours();
}
</script>
